{% include 'navbar.html' %}
<body >
    <div class="container">
        {% include 'pestanas.html' %}
    </div>

    <div class="container bg-white p-4 rounded shadow-sm mt-4">
        <h1 class="text-center mb-4">Catálogo de Marcas de Vehiculos</h1>

        <form method="GET" class="row g-2 mb-3">
            <div class="col-md-10">
                <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Buscar marca de vehiculo...">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">🔍</button>
            </div>
        </form>

        <a href="{% url 'add_catalogo' 'marcas_vehiculos' %}">
            <button class="btn btn-success mb-3">Nuevo {{ catalogo|title }}</button>
        </a>   
        <table class="table table-bordered table-hover">
            <thead class="table-light">
                <tr>
                    <th>Clave</th>
                    <th>Nombre</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for marca in marcas_vehiculos %}
                <tr>
                    <td>{{ marca.clave }}</td>
                    <td>{{ marca.descripcion }}</td>
                    <td class="d-flex justify-content-center">
                        <a href="{% url 'update_catalogo' 'marcas_vehiculos' marca.clave%}" class="btn btn-warning btn-sm me-2">✏️</a>
                        <form action="{% url 'delete_catalogo' 'marcas_vehiculos' marca.clave %}" method="POST" onsubmit="return confirm('¿Estás seguro de eliminar esta marca de vehículo?');">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger btn-sm">🗑️</button>
                        </form>                        
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center">No se encontraron marcas de vehículos</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
