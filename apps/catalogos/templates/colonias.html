{% include 'navbar.html' %}

<body>
    <div class="container">
        {% include 'pestanas.html' %}
    </div>

    <div class="container bg-white p-4 rounded shadow-sm mt-4">
        <h2 class="text-center mb-4 main-title">Catálogo de Colonias</h2>

        <form method="GET" class="row g-2 mb-3">
            <div class="col-md-10">
                <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Buscar colonia...">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">🔍</button>
            </div>
        </form>
        <a href="{% url 'add_catalogo' 'colonias' %}">
            <button class="btn btn-success mb-3">Nueva {{ catalogo|title }}</button>
        </a>
        <table class="table table-bordered table-hover">
            <thead class="table-light">
                <tr>
                    <th>Colonia</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for colonia in colonias %}
                <tr>
                    <td>{{ colonia.colonia }}</td>
                    <td class="d-flex justify-content-center">
                        <a href="{% url 'update_catalogo' 'colonias' colonia.clave%}"
                            class="btn btn-warning btn-sm me-2"><i class="bi bi-pencil-fill"></i> Editar
                        </a>
                        <form action="{% url 'delete_catalogo' 'colonias' colonia.clave %}" method="POST"
                            onsubmit="return confirm('¿Estás seguro de eliminar esta colonia?');">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger btn-sm"><i class="bi bi-trash-fill"></i>
                                Eliminar
                            </button>

                        </form>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center">No se encontraron colonias</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% include 'footer.html' %}
</body>
