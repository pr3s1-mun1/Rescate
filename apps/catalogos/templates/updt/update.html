{% extends 'navbar.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-body">
            <h2 class="text-center mb-4 main-title">Editar {{ titulo }}</h2>

            <form method="POST" class="mt-3">
                {% csrf_token %}

                {{ form.non_field_errors }}

                <!-- Renderizar cada campo con su respectivo estilo -->
                {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label">
                            {{ field.label }}
                        </label>
                        {{ field }}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-success w-100">
                    Guardar
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'catalogo_general' tipo=tipo %}" class="text-primary text-decoration-none">
                    Volver
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
