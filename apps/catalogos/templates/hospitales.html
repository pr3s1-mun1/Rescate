{% include 'navbar.html' %}

<body >
    <div class="container">
        {% include 'pestanas.html' %}
    </div>

    <div class="container bg-white p-4 rounded shadow-sm mt-4">
        <h1 class="text-center mb-4">Catálogo de Hospitales</h1>

        <form method="GET" class="row g-2 mb-3">
            <div class="col-md-10">
                <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Buscar hospital...">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">🔍</button>
            </div>
        </form>

        <a href="{% url 'add_catalogo' 'hospitales' %}" class="btn btn-success mb-3">Nuevo {{ catalogo|title }}</a>

        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Clave</th>
                        <th>Nombre</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for hospital in hospitales %}
                    <tr>
                        <td>{{ hospital.clave }}</td>
                        <td>{{ hospital.nombre }}</td>
                        <td class="text-center">
                            <a href="{% url 'update_catalogo' 'hospitales' hospital.clave %}" class="btn btn-warning btn-sm">✏️</a>
                            <form method="POST" action="{% url 'delete_catalogo' 'hospitales' hospital.clave %}" class="d-inline" onsubmit="return confirm('¿Estás seguro de eliminar este hospital?');">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-danger btn-sm">🗑️</button>
                            </form>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center">No se encontraron hospitales</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
