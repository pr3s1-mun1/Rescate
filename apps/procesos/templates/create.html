{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Servicio</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Tu CSS personalizado -->
    <link rel="stylesheet" href="{% static 'css/servicio.css' %}">
    
</head>

<body>
    {% include 'navbar.html' %}

    <div class="d-flex">
        <div class="container">
            <form method="post" id="servicioForm" action="{% url 'crear_servicio' %}" enctype="multipart/form-data" novalidate>
                {% csrf_token %}
                
                <ul style="background-color: var(--guinda-oscuro); border-radius: 10px;" class="nav nav-tabs" id="mainTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="servicio-tab" data-bs-toggle="tab" data-bs-target="#servicio" type="button" role="tab" aria-controls="servicio" aria-selected="true">
                            <i class="fas fa-ambulance me-2"></i>Servicio
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="unidad-tab" data-bs-toggle="tab" data-bs-target="#unidad" type="button" role="tab" aria-controls="unidad" aria-selected="false">
                            <i class="fas fa-truck-medical me-2"></i>Unidad
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="paramedicos-tab" data-bs-toggle="tab" data-bs-target="#paramedicos" type="button" role="tab" aria-controls="paramedicos" aria-selected="false">
                            <i class="fas fa-user-md me-2"></i>Paramédicos
                        </button>
                    </li>
                    <li class="nav-item nav-item-guardar" role="presentation">
                        <button type="submit" class="nav-link btn-guardar" id="btnGuardar" onclick="return confirmarGuardar()">
                            <i class="fas fa-save me-2"></i> Guardar Servicio
                        </button>
                    </li>
                </ul>

                <div class="tab-content p-3 border border-top-0 rounded-bottom" id="mainTabsContent">
                    <!-- Pestaña Servicio -->
                    <div class="tab-pane fade show active" id="servicio" role="tabpanel" aria-labelledby="servicio-tab">
                        {% include 'crear/servicio.html' %}
                        <div class="d-flex justify-content-end mt-3"></div>
                    </div>
                    
                    <!-- Pestaña Unidad -->
                    <div class="tab-pane fade" id="unidad" role="tabpanel" aria-labelledby="unidad-tab">
                        {% include 'crear/unidad_asignado.html' %}
                        <div class="d-flex justify-content-between mt-3"></div>
                    </div>
                    
                    <!-- Pestaña Paramédicos -->
                    <div class="tab-pane fade" id="paramedicos" role="tabpanel" aria-labelledby="paramedicos-tab">
                        {% include 'crear/paramedico_asignado.html' %}
                        <div class="d-flex justify-content-between mt-3"> </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!--<script src="{% static 'js/create.js' %}"></script>-->
</body>
</html>
