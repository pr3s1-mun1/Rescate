<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Guardado Exitoso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        let seconds = 3;
        function countdown() {
            const counterElement = document.getElementById('countdown');
            const interval = setInterval(() => {
                seconds--;
                counterElement.textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    window.location.href = "{% url 'carga_modifica_n' clave%}";
                }
            }, 1000);
        }
        window.onload = countdown;
    </script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card text-center shadow p-4">
        <div class="card-body">
            <h1 class="card-title text-success">¡Datos guardados correctamente!</h1>
            <p class="card-text">La información del servicio con clave <strong>{{ clave }}</strong> fue guardada exitosamente.</p>
            <p class="text-muted">Redirigiendo a la edición en <span id="countdown">3</span> segundos...</p>
            <a href="{% url 'formulario_buscar' %}" class="btn btn-warning mt-3">
                Volver a panel de búsqueda
            </a>
            <a href="{% url 'carga_modifica_n' clave %}" class="btn btn-success mt-3">
                Volver a editar
            </a>
        </div>
    </div>
</body>
</html>
