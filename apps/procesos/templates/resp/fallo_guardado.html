<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error al Guardar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card text-center shadow p-4">
        <div class="card-body">
            <h1 class="card-title text-danger">Error al guardar los datos</h1>
            <p class="card-text">Ocurrió un error al intentar guardar la información del servicio.</p>
            <p class="text-muted"><strong>Error:</strong> {{ error }}</p>
            <a href="{% url 'carga_modifica' servicio.clave %}" class="btn btn-danger mt-3">
                Volver a intentar
            </a>
        </div>
    </div>
</body>
</html>
