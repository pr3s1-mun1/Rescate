{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/servicio.css' %}">
</head>

<body>
    {% include 'navbar.html' %}

    <div class="d-flex">
        <div class="container">
            <form method="post" id="servicioForm" action="{% url 'guardar_todo' servicio.clave %}" enctype="multipart/form-data" novalidate>
                {% csrf_token %}
                
                <ul class="nav nav-tabs" id="mainTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="servicio-tab" data-bs-toggle="tab" data-bs-target="#servicio" type="button" role="tab" aria-controls="servicio" aria-selected="true">
                            <i class="fa-solid fa-file-lines me-2"></i>Servicio
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="unidad-tab" data-bs-toggle="tab" data-bs-target="#unidad" type="button" role="tab" aria-controls="unidad" aria-selected="false">
                            <i class="fas fa-truck-medical me-2"></i>Unidad
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="paramedicos-tab" data-bs-toggle="tab" data-bs-target="#paramedicos" type="button" role="tab" aria-controls="paramedicos" aria-selected="false">
                            <i class="fas fa-user-md me-2"></i>Paramédicos
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="pestana4-tab" data-bs-toggle="tab" data-bs-target="#pestana4" type="button" role="tab" aria-controls="pestana4" aria-selected="false">
                            <i class="fa-solid fa-user me-2"></i>Paciente
                        </button>
                    </li>
                </ul>

                <div class="tab-content p-3 border border-top-0 rounded-bottom" id="mainTabsContent">
                    <div class="tab-pane fade show active" id="servicio" role="tabpanel" aria-labelledby="servicio-tab">
                        {% include 'crear/servicio.html' %}
                        <div class="d-flex justify-content-end mt-3">
                            <button type="button" class="btn btn-primary next-tab" data-next-tab="unidad-tab">
                                Siguiente <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="tab-pane fade" id="unidad" role="tabpanel" aria-labelledby="unidad-tab">
                        {% include 'crear/unidad_asignado.html' %}
                        <div class="d-flex justify-content-between mt-3">
                            <button type="button" class="btn btn-secondary prev-tab" data-prev-tab="servicio-tab">
                                <i class="fas fa-arrow-left me-2"></i> Anterior
                            </button>
                            <button type="button" class="btn btn-primary next-tab" data-next-tab="paramedicos-tab">
                                Siguiente <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="tab-pane fade" id="paramedicos" role="tabpanel" aria-labelledby="paramedicos-tab">
                        {% include 'crear/paramedico_asignado.html' %}
                        <div class="d-flex justify-content-between mt-3">
                            <button type="button" class="btn btn-secondary prev-tab" data-prev-tab="unidad-tab">
                                <i class="fas fa-arrow-left me-2"></i> Anterior
                            </button>
                            {% if editar %}
                            <button type="button" class="btn btn-primary next-tab" data-next-tab="pestana4-tab">
                                Siguiente <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                            {% else %}
                            <button type="submit" class="btn btn-success" id="btnGuardar">
                                <i class="fas fa-save me-2"></i> Guardar Servicio
                            </button>
                            {% endif %}
                        </div>
                    </div>
                    
                    <div class="tab-pane fade" id="pestana4" role="tabpanel" aria-labelledby="pestana4-tab">
                        {% include 'crear/paciente.html' %}

                        <div class="d-flex justify-content-between mt-3">
                            <button type="button" class="btn btn-secondary prev-tab" data-prev-tab="paramedicos-tab">
                                <i class="fas fa-arrow-left me-2"></i> Anterior
                            </button>                         
                            </button>
                            <button type="submit" class="btn btn-success" id="btnGuardar">
                                <i class="fas fa-save me-2"></i> Guardar Servicio
                            </button>
                        </div>
                    </div>
                    
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Navegación entre pestañas
        document.querySelectorAll('.next-tab').forEach(button => {
            button.addEventListener('click', function() {
                const nextTabId = this.getAttribute('data-next-tab');
                const nextTab = document.getElementById(nextTabId);
                const tabInstance = new bootstrap.Tab(nextTab);
                tabInstance.show();
            });
        });

        document.querySelectorAll('.prev-tab').forEach(button => {
            button.addEventListener('click', function() {
                const prevTabId = this.getAttribute('data-prev-tab');
                const prevTab = document.getElementById(prevTabId);
                const tabInstance = new bootstrap.Tab(prevTab);
                tabInstance.show();
            });
        });

        document.getElementById('servicioForm').addEventListener('submit', function(e) {
            // 1. Activar TODOS los campos ocultos momentáneamente
            const allTabs = document.querySelectorAll('.tab-pane');
            allTabs.forEach(tab => {
                tab.classList.add('active', 'show');
            });
            
            // 2. Asegurar que todos los inputs tengan valores
            const allInputs = this.querySelectorAll('input, select, textarea');
            allInputs.forEach(input => {
                if (!input.name) return;
                
                // Para campos de texto vacíos
                if ((input.type === 'text' || input.type === 'number') && !input.value) {
                    input.value = ''; // Enviar cadena vacía explícitamente
                }
                
                // Para selects no seleccionados
                if (input.tagName === 'SELECT' && !input.value) {
                    input.disabled = false; // Asegurar que se envíe
                }
            });
            
            // 3. Manejo especial para checkboxes (que ya funciona en tu caso)
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => {
                if (!cb.name) return;
                if (!cb.checked) {
                    const hiddenInput = document.createElement('input');
                    hiddenInput.type = 'hidden';
                    hiddenInput.name = cb.name;
                    hiddenInput.value = 'False';
                    this.appendChild(hiddenInput);
                }
            });
            
            // 4. Deshabilitar botón para evitar envíos duplicados
            const submitBtns = document.querySelectorAll('[type="submit"]');
            submitBtns.forEach(btn => {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Guardando...';
            });
            
            // Opcional: Mostrar en consola lo que se enviará
            console.log("Datos a enviar:", new FormData(this));
        });

        function validarPestana(tabId) {
            console.log(`Validando pestaña: ${tabId}`);
            let isValid = true;
            const currentTab = document.getElementById(tabId);
            
            // Verificar campos requeridos
            currentTab.querySelectorAll('[required]').forEach(field => {
                if (!field.value.trim()) {
                    field.classList.add('is-invalid');
                    isValid = false;
                } else {
                    field.classList.remove('is-invalid');
                }
            });
            
            return isValid;
        }

        document.getElementById('mainTabs').addEventListener('click', function(e) {
        if (e.target.classList.contains('nav-link') && !e.target.classList.contains('active')) {
            const currentTab = document.querySelector('.tab-pane.active');
            if (!validarPestana(currentTab.id)) {
                e.preventDefault();
                alert('Complete los campos requeridos antes de cambiar de pestaña');
                return false;
            }
        }
    });
    </script>
</body>
</html>
