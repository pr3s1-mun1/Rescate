<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Testigos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">Testigos</h1>
        <div class="row">
            <!-- Columna izquierda: Formulario -->
            <div class="col-md-6">
                <div class="bg-light p-4 rounded shadow-sm">
                    <div class="mb-3">
                        <label for="testigo" class="form-label">Nombre del testigo</label>
                        <input type="text" class="form-control" id="nomtestigo">
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="form-label">Edad del testigo</label>
                        <input type="number" class="form-control" id="telefono">
                    </div>

                    <div class="mb-3">
                        <label for="direccion" class="form-label">Dirección del testigo</label>
                        <input type="text" class="form-control" id="direccion">
                    </div>

                    <div class="mb-3">
                        <label for="numero" class="form-label">Teléfono del testigo</label>
                        <input type="number" class="form-control" id="numero">
                    </div>

                    <a href="#" class="btn btn-primary" onclick="agregarTestigo()">Agregar</a>
                </div>
            </div>

            <!-- Columna derecha: Tabla -->
            <div class="col-md-6">
                <div class="bg-white p-4 rounded shadow-sm">
                    <h5 class="mb-3">Lista de Testigos</h5>
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Edad</th>
                                <th>Dirección</th>
                                <th>Teléfono</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-testigos">
                            <!-- Filas se agregarán aquí -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function agregarTestigo() {
            const nombre = document.getElementById('nomtestigo').value.trim();
            const edad = document.getElementById('telefono').value.trim();
            const direccion = document.getElementById('direccion').value.trim();
            const numero = document.getElementById('numero').value.trim();

            if (!nombre || !edad || !direccion || !numero) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            const tabla = document.getElementById('tabla-testigos');
            const fila = document.createElement('tr');

            fila.innerHTML = `
                <td>${nombre}</td>
                <td>${edad}</td>
                <td>${direccion}</td>
                <td>${numero}</td>
            `;

            tabla.appendChild(fila);

            // Limpiar campos
            document.getElementById('nomtestigo').value = '';
            document.getElementById('telefono').value = '';
            document.getElementById('direccion').value = '';
            document.getElementById('numero').value = '';
        }
    </script>
</body>
</html>
