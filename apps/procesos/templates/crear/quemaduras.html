{% load static %}

<body>
    <div class="d-flex">
        <div class="container">
            <div class="form-container bg-light p-4 rounded shadow-sm">
                <h1 class="text-center mb-4">Selección de Quemaduras</h1>
                <div class="row align-items-start">
                    <!-- Columna izquierda - Figura humana posterior -->
                    <div class="col-md-4 human-body-container">
                        <svg width="200" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500"
                            class="human-body w-100 h-100">
                            <!-- Cabeza circular dividida en 4 cuadrantes -->
                            <path class="parte-cuerpo-quem parte-cabeza" id="head-ul"
                                d="M150,60 L150,30 A30,30 0 0,0 120,60 L150,60 Z" fill="#f8f9fa" stroke="#333"
                                stroke-width="1.5" data-parte="CABEZA POST. SUP. IZQUIERDA" data-valor="18.00" />
                            <path class="parte-cuerpo-quem parte-cabeza" id="head-ur"
                                d="M150,60 L180,60 A30,30 0 0,0 150,30 L150,60 Z" fill="#f8f9fa" stroke="#333"
                                stroke-width="1.5" data-parte="CABEZA POST. SUP. DERECHA" data-valor="" />
                            <path class="parte-cuerpo-quem parte-cabeza" id="head-ll"
                                d="M150,60 L120,60 A30,30 0 0,0 150,90 L150,60 Z" fill="#f8f9fa" stroke="#333"
                                stroke-width="1.5" data-parte="CABEZA POST. INF. IZQUIERDA" data-valor="" />
                            <path class="parte-cuerpo-quem parte-cabeza" id="head-lr"
                                d="M150,60 L150,90 A30,30 0 0,0 180,60 L150,60 Z" fill="#f8f9fa" stroke="#333"
                                stroke-width="1.5" data-parte="CABEZA POST. INF. DERECHA" data-valor="" />
                            <circle cx="150" cy="60" r="30" fill="none" stroke="#333" stroke-width="1.5" />

                            <!-- Torso dividido -->
                            <rect class="parte-cuerpo-quem parte-torso" id="torso-left-1" x="120" y="90" width="60"
                                height="120" fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="LESIÓN ESPALDA"
                                data-value="" />

                            <!-- Brazos -->
                            <rect class="parte-cuerpo-quem" id="left-shoulder" x="90" y="90" width="30" height="30"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="HOMBRO IZQUIERDO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="left-arm" x="90" y="120" width="30" height="40"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="BRAZO IZQUIERDO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="left-forearm" x="90" y="160" width="30" height="40"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="ANTEBRAZO IZQUIERDO"
                                data-valor="" />

                            <rect class="parte-cuerpo-quem" id="right-shoulder" x="180" y="90" width="30" height="30"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="HOMBRO DERECHO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="right-arm" x="180" y="120" width="30" height="40"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="BRAZO DERECHO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="right-forearm" x="180" y="160" width="30" height="40"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="ANTEBRAZO DERECHO"
                                data-valor="" />

                            <!-- Piernas -->
                            <rect class="parte-cuerpo-quem" id="left-thigh" x="120" y="210" width="30" height="50"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="MUSLO IZQUIERDO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="left-knee" x="120" y="260" width="30" height="20"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="RODILLA IZQUIERDA"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="left-leg" x="120" y="280" width="30" height="70"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="PIERNA IZQUIERDA"
                                data-valor="" />

                            <rect class="parte-cuerpo-quem" id="right-thigh" x="150" y="210" width="30" height="50"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="MUSLO DERECHO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="right-knee" x="150" y="260" width="30" height="20"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="RODILLA DERECHA"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="right-leg" x="150" y="280" width="30" height="70"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="PIERNA DERECHA"
                                data-valor="" />
                        </svg>
                        <h3>Posterior</h3>

                    </div>
                    

                    <!-- Columna central - Figura humana frontal -->
                    <div class="col-md-4 human-body-container">
                        <svg width="200" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 500"
                            class="human-body w-100 h-100">
                            <!-- Cabeza circular dividida en 4 cuadrantes -->
                            <path class="parte-cuerpo-quem parte-cabeza" id="head-ul"
                                d="M150,60 L150,30 A30,30 0 0,0 120,60 L150,60 Z" fill="#f8f9fa" stroke="#333"
                                stroke-width="1.5" data-parte="CABEZA FRONT. SUP. IZQUIERDA" data-valor="18.00" />
                            <path class="parte-cuerpo-quem parte-cabeza" id="head-ur"
                                d="M150,60 L180,60 A30,30 0 0,0 150,30 L150,60 Z" fill="#f8f9fa" stroke="#333"
                                stroke-width="1.5" data-parte="CABEZA FRONT. SUP. DERECHA" data-valor="" />
                            <path class="parte-cuerpo-quem parte-cabeza" id="head-ll"
                                d="M150,60 L120,60 A30,30 0 0,0 150,90 L150,60 Z" fill="#f8f9fa" stroke="#333"
                                stroke-width="1.5" data-parte="CABEZA FRONT. INF. IZQUIERDA" data-valor="" />
                            <path class="parte-cuerpo-quem parte-cabeza" id="head-lr"
                                d="M150,60 L150,90 A30,30 0 0,0 180,60 L150,60 Z" fill="#f8f9fa" stroke="#333"
                                stroke-width="1.5" data-parte="CABEZA FRONT. INF. DERECHA" data-valor="" />
                            <circle cx="150" cy="60" r="30" fill="none" stroke="#333" stroke-width="1.5" />

                            <!-- Torso dividido -->
                            <rect class="parte-cuerpo-quem parte-torso" id="torso-left-1" x="120" y="90" width="30"
                                height="30" fill="#f8f9fa" stroke="#333" stroke-width="1.5"
                                data-parte="TORAX SUPERIOR IZQUIERDO" data-valor="" />
                            <rect class="parte-cuerpo-quem parte-torso" id="torso-left-2" x="120" y="120" width="30"
                                height="30" fill="#f8f9fa" stroke="#333" stroke-width="1.5"
                                data-parte="TORAX INFERIOR IZQUIERDO" data-valor="" />
                            <rect class="parte-cuerpo-quem parte-torso" id="torso-left-3" x="120" y="150" width="30"
                                height="30" fill="#f8f9fa" stroke="#333" stroke-width="1.5"
                                data-parte="ABDOMEN SUPERIOR IZQUIERDO" data-valor="" />
                            <rect class="parte-cuerpo-quem parte-torso" id="torso-left-4" x="120" y="180" width="30"
                                height="30" fill="#f8f9fa" stroke="#333" stroke-width="1.5"
                                data-parte="ABDOMEN INFERIOR IZQUIERDO" data-valor="" />

                            <rect class="parte-cuerpo-quem parte-torso" id="torso-right-1" x="150" y="90" width="30"
                                height="30" fill="#f8f9fa" stroke="#333" stroke-width="1.5"
                                data-parte="TORAX SUPERIOR DERECHO" data-valor="" />
                            <rect class="parte-cuerpo-quem parte-torso" id="torso-right-2" x="150" y="120" width="30"
                                height="30" fill="#f8f9fa" stroke="#333" stroke-width="1.5"
                                data-parte="TORAX INFERIOR DERECHO" data-valor="" />
                            <rect class="parte-cuerpo-quem parte-torso" id="torso-right-3" x="150" y="150" width="30"
                                height="30" fill="#f8f9fa" stroke="#333" stroke-width="1.5"
                                data-parte="ABDOMEN SUPERIOR DERECHO" data-valor="" />
                            <rect class="parte-cuerpo-quem parte-torso" id="torso-right-4" x="150" y="180" width="30"
                                height="30" fill="#f8f9fa" stroke="#333" stroke-width="1.5"
                                data-parte="ABDOMEN INFERIOR DERECHO" data-valor="" />

                            <!-- Brazos -->
                            <rect class="parte-cuerpo-quem" id="left-shoulder" x="90" y="90" width="30" height="30"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="HOMBRO IZQUIERDO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="left-arm" x="90" y="120" width="30" height="40"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="BRAZO IZQUIERDO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="left-forearm" x="90" y="160" width="30" height="40"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="ANTEBRAZO IZQUIERDO"
                                data-valor="" />

                            <rect class="parte-cuerpo-quem" id="right-shoulder" x="180" y="90" width="30" height="30"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="HOMBRO DERECHO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="right-arm" x="180" y="120" width="30" height="40"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="BRAZO DERECHO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="right-forearm" x="180" y="160" width="30" height="40"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="ANTEBRAZO DERECHO"
                                data-valor="" />

                            <!-- Piernas -->
                            <rect class="parte-cuerpo-quem" id="left-thigh" x="120" y="210" width="30" height="50"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="MUSLO IZQUIERDO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="left-knee" x="120" y="260" width="30" height="20"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="RODILLA IZQUIERDA"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="left-leg" x="120" y="280" width="30" height="70"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="PIERNA IZQUIERDA"
                                data-valor="" />

                            <rect class="parte-cuerpo-quem" id="right-thigh" x="150" y="210" width="30" height="50"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="MUSLO DERECHO"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="right-knee" x="150" y="260" width="30" height="20"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="RODILLA DERECHA"
                                data-valor="" />
                            <rect class="parte-cuerpo-quem" id="right-leg" x="150" y="280" width="30" height="70"
                                fill="#f8f9fa" stroke="#333" stroke-width="1.5" data-parte="PIERNA DERECHA"
                                data-valor="" />
                        </svg>
                        <h3>Frontal</h3>
                    </div>

                    <!-- Columna derecha - Tabla de selección -->
                    <div class="col-md-4 selection-table-container">
                        <p><strong>Quemaduras seleccionadas:</strong>
                            <span id="contador-quemaduras-seleccionadas">0</span>
                        </p>
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered" id="tabla-quemaduras-seleccionadas">
                                <thead>
                                    <tr>
                                        <th scope="col">Parte del cuerpo</th>
                                        <th scope="col">Valor</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for quemadura in quemaduras_asignados %}
                                    <tr>
                                        <td>{{ quemadura.quemadura }}</td>
                                        <td>{{ quemadura.valor }}</td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="mt-3 text-center">
                        <button type="button" class="btn btn-outline-danger m-1 parte-cuerpo-quem" data-parte="Quemadura 1er Grado">Quemadura 1er Grado</button>
                        <button type="button" class="btn btn-outline-danger m-1 parte-cuerpo-quem" data-parte="Quemadura 2do Grado">Quemadura 2do Grado</button>
                        <button type="button" class="btn btn-outline-danger m-1 parte-cuerpo-quem" data-parte="Quemadura 3er Grado">Quemadura 3er Grado</button>
                        <button type="button" class="btn btn-outline-danger m-1 parte-cuerpo-quem" data-parte="Lesión Total" data-valor="100">Lesión Total</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <input type="hidden" id="input-quemaduras-seleccionadas" name="quemaduras">

</body>
<script src="{% static 'js/quemadura_asign.js'%}"></script>
<script src="{% static 'js/general_asig.js'%}"></script>
