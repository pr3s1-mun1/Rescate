{% load static %}

<body>
    <div class="d-flex">
        <div class="container py-5">
            <div class="form-container bg-light p-4 rounded shadow-sm">
                <h1 class="text-center mb-4">Alergias</h1>
        
                <form method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="alergias_seleccionadas" id="input-alergias-seleccionadas">
                    
                    <div class="row align-items-start">
                        <div class="col-md-6">
                            <p><strong>Alergias disponibles:</strong> 
                                <span id="contador-alergias-disponibles">0</span>
                            </p>
                            <table class="table table-striped table-bordered" id="tabla-alergias-disponibles">
                                <thead>
                                    <tr>
                                        <th scope="col">Clave</th>
                                        <th scope="col">Descripción</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for alergia in alergias %}
                                    <tr ondblclick="moverASeleccionadosAlergia(this, '{{ alergia.clave }}', '{{ alergia.descripcion }}')">
                                        <td>{{ alergia.clave }}</td>
                                        <td>{{ alergia.descripcion }}</td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>
                    
                        <div class="col-md-6">
                            <p><strong>Alergias asignadas:</strong> 
                                <span id="contador-alergias-asignadas">0</span>
                            </p>
                            <table class="table table-bordered table-hover" id="tabla-alergias-asignadas">
                                <thead>
                                    <tr>
                                        <th scope="col">Clave</th>
                                        <th scope="col">Descripción</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Aquí se insertan las asignadas por JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-center gap-3 mt-3">
                        <button type="submit" class="btn btn-primary" name="submit_alergias">Asignar</button>
                        <a href="#" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>    
        </div>
    </div>
</body>

<script src="{% static 'js/alergias_asign.js' %}"></script>
