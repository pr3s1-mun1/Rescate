{% extends "navbar.html" %}

{% block content %}
<div class="access-denied-container">
  <div class="access-denied-card">
    <div class="access-denied-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16">
        <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
        <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
      </svg>
    </div>
    <h1 class="access-denied-title">Acceso Restringido</h1>
    <p class="access-denied-message">No cuentas con los permisos necesarios para acceder a esta sección.</p>
    
    <div class="access-denied-actions">
      <a href="{% url 'vista_main' %}" class="btn" style="background-color: #831f46; color: white;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
        </svg>
        Ir a Servicios
      </a>
      
    </div>
  </div>
</div>

<style>
  .access-denied-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
    padding: 20px;
    background-color: #f8f9fa;
  }
  
  .access-denied-card {
    max-width: 500px;
    width: 100%;
    padding: 2rem;
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    text-align: center;
  }
  
  .access-denied-icon {
    margin-bottom: 1.5rem;
    color: #dc3545;
  }
  
  .access-denied-title {
    color: #dc3545;
    margin-bottom: 1rem;
    font-weight: 600;
  }
  
  .access-denied-message {
    color: #6c757d;
    margin-bottom: 1.5rem;
    font-size: 1.1rem;
  }
  
  .access-denied-details {
    background-color: #f8f9fa;
    padding: 1rem;
    border-radius: 4px;
    margin-bottom: 1.5rem;
    border-left: 4px solid #dc3545;
  }
  
  .access-denied-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    text-decoration: none;
    transition: all 0.2s;
  }
  
  .btn-primary {
    background-color: #007bff;
    color: white;
    border: 1px solid #007bff;
  }
  
  .btn-primary:hover {
    background-color: #0069d9;
    border-color: #0062cc;
  }
  
  .btn-outline-secondary {
    color: #6c757d;
    border: 1px solid #6c757d;
    background-color: transparent;
  }
  
  .btn-outline-secondary:hover {
    background-color: #6c757d;
    color: white;
  }
  
  @media (max-width: 576px) {
    .access-denied-card {
      padding: 1.5rem;
    }
    
    .access-denied-actions {
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .btn {
      width: 100%;
      justify-content: center;
    }
  }
</style>
{% endblock %}
