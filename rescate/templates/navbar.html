<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Rescate{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/all.css' %}">
  <link rel="icon" type="image/x-icon" href="{% static 'img/Rescate.ico' %}">
</head>

<body>

  <nav class="navbar navbar-expand-lg border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="{% url 'catalogo_general' 'ambulancias' %}">
        <img src="{% static 'img/escudorescate.gif' %}" class="rounded-circle p-1" style="background-color: white; height: 50px;" alt="Rescate Logo">
        <span class="ms-2">Rescate</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'catalogo_general' 'ambulancias' %}">Catálogos</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="procesosDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Procesos
            </a>
            <ul class="dropdown-menu" aria-labelledby="procesosDropdown">
              <li><a class="dropdown-item" href="{% url 'vista_main' %}">Servicios</a></li>
              <li><a class="dropdown-item" href="#">Reloj</a></li>
              <li><a class="dropdown-item" href="#">Gasolina</a></li>
            </ul>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'cargar_reportes' %}">Reportes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'cargar_graficas' %}">Gráficas</a>
          </li>
        </ul>
        <div class="dropdown">
          <button class="btn btn-outline-secondary dropdown-toggle text-white fw-bold" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
            {{ request.session.user|default:"Iniciar sesión" }}
          </button>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
            {% if request.session.user %}
              <li><a class="dropdown-item" href="{% url 'logout' %}">Cerrar sesión</a></li>
            {% else %}
              <li><a class="dropdown-item" href="{% url 'login' %}">Iniciar sesión</a></li>
            {% endif %}
          </ul>
        </div>        
        
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

</body>

</html>
