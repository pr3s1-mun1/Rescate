{% load static %}

<footer class="app-footer">
    <div class="footer-container">
        <div class="footer-content">
            <!-- Logo institucional -->
            <div class="footer-brand">
                <img src="{% static 'img/proteccion-logo2.png' %}" alt="Protección Civil" class="footer-logo">
            </div>

            <!-- Imagen adicional -->
            <div class="footer-extra-image">
                <img src="{% static 'img/juarez-conectado.png' %}" alt="Juárez Conectado" class="extra-footer-logo">
            </div>

            <div class="developer-info">
                <span class="developed-by">Desarrollado Por:</span>
                <img src="{% static 'img/LOGO DGIC 24-27 V.png' %}" alt="Dirección General de Innovación y Calidad" class="developer-logo">
            </div>
        </div>
    </div>
</footer>

<style>
    .app-footer {
        background: linear-gradient(to right, #68696f, #55636e);
        color: white;
        padding: 1.2rem 1rem;
        font-family: 'Inter', sans-serif;
        margin-top: 40px;
        box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
    }

    .footer-container {
        max-width: 1000px;
        margin: 0 auto;
    }

    .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1.5rem;
    }

    .footer-brand, 
    .footer-extra-image,
    .developer-info {
        flex: 1;
        min-width: 150px;
        text-align: center;
    }

    .extra-footer-logo {
        height: 45px;
        width: auto;
        object-fit: contain;
    }

    .footer-logo {
        height: 55px;
        width: auto;
        object-fit: contain;
    }

    .developer-info {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.8rem;
    }

    .developed-by {
        font-size: 0.85rem;
        font-weight: bold;
        color: white;
    }

    .developer-logo {
        height: 55px;
        width: auto;
        object-fit: contain;
    }

    @media (max-width: 768px) {
        .footer-content {
            flex-direction: column;
            gap: 1rem;
        }
        
        .developer-info {
            flex-direction: column;
            gap: 0.5rem;
        }
    }
</style>
