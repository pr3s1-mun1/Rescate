{% load static %}
<footer class="footer-guinda">
    <div class="container py-4">
        <div class="row align-items-center">
            <!-- Logo y Nombre Institucional -->
            <div class="col-lg-4 mb-4 mb-lg-0">
                <div class="d-flex align-items-center justify-content-center justify-content-lg-start">
                    <img src="{% static 'img/Juarez_2024-2027-03.png' %}" alt="Protección Civil" class="footer-logo me-3">
                    <div>
                        <h4 class="mb-0">Protección Civil</h4>
                        <p class="mb-0 footer-subtitle">Dirección General de Protección Civil</p>
                    </div>
                </div>
            </div>

            <!-- Enlaces Rápidos -->
            <div class="col-lg-4 mb-4 mb-lg-0">
                <div class="footer-links d-flex justify-content-center">
                    <a href="#" class="footer-link mx-3">
                        <i class="fas fa-shield-alt"></i> Privacidad
                    </a>
                    <a href="#" class="footer-link mx-3">
                        <i class="fas fa-file-contract"></i> Términos
                    </a>
                    <a href="#" class="footer-link mx-3">
                        <i class="fas fa-envelope"></i> Contacto
                    </a>
                </div>
            </div>

            <!-- Desarrollador con Logo -->
            <div class="col-lg-4">
                <div class="d-flex align-items-center justify-content-center justify-content-lg-end">
                    <div class="text-end me-3">
                        <p class="mb-0 footer-dev-name">Desarrollado por</p>
                    </div>
                    <img src="{% static 'img/LOGO DGIC 24-27 V.png' %}" alt="Logo Desarrollador" class="developer-logo">
                </div>
            </div>
        </div>

        <!-- Derechos de Autor -->
        <div class="row mt-3">
            <div class="col-12 text-center">
                <p class="footer-copyright mb-0">
                    <i class="far fa-copyright"></i> {{ year }} Gobierno Municipal - Todos los derechos reservados.
                </p>
            </div>
        </div>
    </div>
<style>
    /* Footer principal */
    .footer-guinda {
        background-color: #7d0a42; /* Color guinda */
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 2rem 0;
    }

    /* Logo del footer */
    .footer-logo {
        height: 60px;
        width: auto;
        object-fit: contain;
        background-color: white;
        padding: 2px;
        border-radius: 5px;
    }

    /* Subtítulo */
    .footer-subtitle {
        font-size: 0.9rem;
        opacity: 0.9;
    }

    /* Enlaces */
    .footer-links {
        flex-wrap: wrap;
    }

    .footer-link {
        color: white;
        text-decoration: none;
        transition: all 0.3s ease;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
    }

    .footer-link:hover {
        color: #ffcc00; /* Amarillo para hover */
        transform: translateY(-2px);
    }

    .footer-link i {
        margin-right: 5px;
        font-size: 1rem;
    }

    /* Texto del desarrollador */
    .footer-dev-name {
        font-size: 0.8rem;
        opacity: 0.8;
    }

    /* Logo del desarrollador */
    .developer-logo {
        height: 40px;
        width: auto;
        object-fit: contain;
        background-color: white;
        padding: 2px;
        border-radius: 5px;
    }

    /* Copyright */
    .footer-copyright {
        font-size: 0.8rem;
        opacity: 0.8;
    }

    .footer-copyright i {
        margin-right: 3px;
    }

    /* Responsive */
    @media (max-width: 992px) {
        .footer-links {
            margin: 15px 0;
        }
        
        .footer-link {
            margin: 0 10px 10px 10px !important;
        }
        
        .footer-dev-name {
            text-align: center !important;
        }
    }

    @media (max-width: 576px) {
        .footer-logo {
            height: 50px;
        }
        
        .developer-logo {
            height: 35px;
        }
    }
</style>
</footer>
